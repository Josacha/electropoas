<!DOCTYPE html>
<html>

<head>

<title>Panel</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<button id="logout">Cerrar sesión</button>

<h2>Administrar productos</h2>

<input id="nombre" placeholder="Nombre">

<input id="marca" placeholder="Marca">

<input id="categoria" list="listaCategorias" placeholder="Categoria">

<datalist id="listaCategorias"></datalist>

<input id="voltaje" placeholder="Voltaje">

<input id="amperaje" placeholder="Amperaje">

<input id="imagen" placeholder="URL imagen">

<textarea id="descripcion"></textarea>

<button id="guardar">Guardar producto</button>


<h3>Productos</h3>

<table border="1">

<thead>

<tr>
<th>Imagen</th>
<th>Nombre</th>
<th>Marca</th>
<th>Categoria</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaProductos"></tbody>

</table>

<script type="module" src="js/admin.js"></script>

</body>

</html>
