<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel Administración</title>

<link rel="icon" type="image/png" href="img/JEC.png">
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header>

<div class="logo">
<img src="img/JEC.png">
<h1>JEC ELECTRICOS</h1>
</div>

<nav>
<button id="logout">Cerrar sesión</button>
</nav>

</header>

<section class="admin-panel">

<button id="logout">Cerrar sesión</button>

<h2>Administrar Productos</h2>

<div class="admin-form">

<input id="nombre" placeholder="Nombre del producto">

<input id="marca" placeholder="Marca">

<input id="categoria" placeholder="Categoría">

<input id="voltaje" placeholder="Voltaje">

<input id="amperaje" placeholder="Amperaje">

<input id="imagen" placeholder="URL de imagen">

<textarea id="descripcion" placeholder="Descripción"></textarea>

<button id="guardar">Guardar producto</button>

</div>

</section>


<section class="tabla-productos">

<h2>Productos registrados</h2>

<table>

<thead>

<tr>
<th>Imagen</th>
<th>Nombre</th>
<th>Marca</th>
<th>Categoría</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaProductos"></tbody>

</table>

</section>

<script type="module" src="js/admin.js"></script>

</body>

</html>
